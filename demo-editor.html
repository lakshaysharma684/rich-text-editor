<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Demo — Rich Text Editor v1.4.2</title>
    <link rel="stylesheet" href="src/styles/rte.css">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 40px 20px;
            color: #1e293b;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #0f172a;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #6366f1; color: white; }
        .btn-secondary { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
        
        .output-box {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }
        textarea#output {
            width: 100%;
            height: 200px;
            border: none;
            font-family: monospace;
            font-size: 13px;
            outline: none;
            resize: vertical;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Advanced Developer Demo</h1>
            <p>Showcasing custom buttons, context menus, and full-width toolbar.</p>
        </div>

        <div id="editor-container">
            <h2>Rich Text Editor v1.4.2</h2>
            <p>Right-click anywhere to see the <b>Custom Context Menu</b>.</p>
            <p>Check the toolbar — it now shows <b>all buttons</b> and wraps to a new line on smaller screens.</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="getHTML()">Get HTML Output</button>
            <button class="btn btn-secondary" onclick="editor.clear()">Clear Content</button>
        </div>

        <div class="output-box">
            <h3>Raw HTML Output</h3>
            <textarea id="output" readonly></textarea>
        </div>
    </div>

    <script type="module">
        import RichTextEditor from './src/editor/RichTextEditor.js';

        const editor = new RichTextEditor('#editor-container', {
            placeholder: 'Start writing...',
            contextMenuItems: [
                { label: 'Insert Star ⭐', icon: '⭐', action: (editor) => editor.handleCommand('insertHTML', '⭐') },
                { label: 'Insert Check ✅', icon: '✅', action: (editor) => editor.handleCommand('insertHTML', '✅') },
                { type: 'divider' },
                { label: 'Export PDF', icon: '📄', action: (editor) => alert('PDF Exporting...') }
            ],
            customButtons: [
                {
                    label: '🚀',
                    title: 'Boost',
                    command: 'boost',
                    action: (editor) => editor.handleCommand('insertHTML', '🚀')
                }
            ]
        });

        window.getHTML = () => {
            document.getElementById('output').value = editor.getHTML();
        };

        window.editor = editor;
    </script>
</body>
</html>
