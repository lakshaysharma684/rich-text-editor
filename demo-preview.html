<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Mode — Rich Text Editor v1.4.2</title>
    <link rel="stylesheet" href="src/styles/rte.css">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 50px 20px; background: #fafafa; }
        .preview-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; margin-bottom: 40px; opacity: 0.8; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #6366f1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="preview-container">
        <h1>Static Preview Mode</h1>
        <div id="editor-preview" class="rte-content">
            <h2>This is a static preview</h2>
            <p>The <code>.rte-content</code> class can be used to style static content identically to the editor.</p>
            <p>Try inspecting this page — there's no editor logic here, just pure CSS classes.</p>
        </div>
        <a href="index.html" class="back-link">← Back to Editor</a>
    </div>
</body>
</html>
