<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Text Editor Demo</title>
    <link rel="stylesheet" href="src/styles/rte.css">
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f1f5f9;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #334155;
        }

        .actions {
            margin-top: 20px;
            text-align: right;
        }

        button.action-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button.action-btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Dependency-Free Rich Text Editor</h1>

        <!-- The element to be replaced by the editor -->
        <div id="editor-container">
            <p>Welcome to the custom <b>Rich Text Editor</b>!</p>
            <p>Try the following:</p>
            <ul>
                <li>Format some text (Bold, Italic)</li>
                <li>Drag and drop an image here</li>
                <li>Paste a screenshot from your clipboard</li>
            </ul>
        </div>

        <div class="actions">
            <button class="action-btn" id="save-btn">Get HTML Output</button>
            <button class="action-btn" id="minify-btn" style="background:#10b981;">Get Minified</button>
        </div>

        <div style="margin-top: 20px;">
            <h3>Output Preview (Console also logs this):</h3>
            <textarea id="output" style="width: 100%; height: 150px; font-family: monospace;" readonly></textarea>
        </div>
    </div>

    <!-- Import as Module -->
    <script type="module">
        import RichTextEditor from './src/editor/RichTextEditor.js';

        // Initialize Editor
        const editor = new RichTextEditor('#editor-container', {
            placeholder: 'Type your awesome content here...'
        });

        // Handle Save
        document.getElementById('save-btn').addEventListener('click', () => {
            const html = editor.getHTML();
            console.log('Editor HTML:', html);
            document.getElementById('output').value = html;
        });

        // Handle Minify
        document.getElementById('minify-btn').addEventListener('click', () => {
            const html = editor.getHTML(true); // Pass true for minification
            console.log('Minified HTML:', html);
            document.getElementById('output').value = html;
            alert('Minified HTML captured!');
        });
    </script>
</body>

</html>
